<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB | Plateforme Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: #ffffff; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F1D371 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #F1D371 100%); color: #000; font-weight: 700; transition: all 0.3s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body onload="initApp()">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-card px-4 md:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="handleLogoClick()">
            <div class="w-10 h-10 bg-[#D4AF37] rounded-lg flex items-center justify-center rotate-3"><i class="fas fa-bolt text-black text-xl"></i></div>
            <span class="text-2xl font-black tracking-tighter uppercase italic">VIBZ <span class="text-[#D4AF37]">LAB</span></span>
        </div>
        <button onclick="document.getElementById('apply-form').scrollIntoView()" class="btn-gold px-6 py-2.5 rounded-full text-[10px] uppercase tracking-widest">Postuler</button>
    </nav>

    <!-- Public Section -->
    <main id="public-section">
        <section class="relative h-screen flex items-center justify-center text-center px-6 overflow-hidden">
            <div class="relative z-20 max-w-4xl">
                <h1 class="text-6xl md:text-9xl font-black mb-6 uppercase leading-none">VIBZ <span class="gold-gradient italic">LAB</span> TOUR</h1>
                <p class="text-gray-400 mb-10">La plateforme n°1 pour les talents du Togo.</p>
                <button onclick="document.getElementById('apply-form').scrollIntoView()" class="btn-gold px-10 py-5 rounded-2xl">S'INSCRIRE MAINTENANT</button>
            </div>
        </section>

        <section id="apply-form" class="py-24 px-6 bg-[#0a0a0a]">
            <div class="max-w-xl mx-auto glass-card p-10 rounded-[2rem]">
                <form id="artistForm" class="space-y-6">
                    <input type="text" id="name" placeholder="Nom de scène" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#D4AF37]" required>
                    <select id="city" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                        <option value="Sotouboua">Sotouboua</option>
                        <option value="Sokodé">Sokodé</option>
                        <option value="Kara">Kara</option>
                        <option value="Mango">Mango</option>
                        <option value="Dapaong">Dapaong</option>
                    </select>
                    <input type="tel" id="whatsapp" placeholder="WhatsApp" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" required>
                    <input type="url" id="link" placeholder="Lien démo" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                    <button type="submit" id="submitBtn" class="w-full btn-gold py-5 rounded-2xl uppercase font-bold">Envoyer ma candidature</button>
                </form>
            </div>
        </section>

        <footer class="py-10 text-center opacity-10 hover:opacity-100 transition-opacity">
            <button onclick="toggleAdmin()" class="text-[10px] uppercase tracking-widest"><i class="fas fa-lock"></i> Staff Only</button>
        </footer>
    </main>

    <!-- Admin Section -->
    <main id="admin-section" class="hidden pt-32 px-6 min-h-screen bg-[#050505]">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black uppercase tracking-tighter">Staff <span class="text-[#D4AF37]">Live</span></h1>
                <button onclick="showSection('public')" class="bg-white/10 px-6 py-3 rounded-xl uppercase text-[10px] font-bold">Retour</button>
            </div>
            <div id="loading" class="text-center py-10 text-gray-500">Chargement des données depuis Google Sheets...</div>
            <div id="candidaturesList" class="grid grid-cols-1 gap-4"></div>
        </div>
    </main>

    <script>
        // REMPLACE CETTE URL PAR TON URL GOOGLE APPS SCRIPT COPIÉE À L'ÉTAPE 2
        const SCRIPT_URL = "TON_URL_ICI"; 

        let logoClicks = 0;

        function handleLogoClick() {
            logoClicks++;
            if (logoClicks >= 5) { toggleAdmin(); logoClicks = 0; }
            setTimeout(() => { logoClicks = 0; }, 3000);
        }

        async function initApp() {
            // Pas de stockage local, on laisse vide ou on charge si admin
        }

        document.getElementById('artistForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "ENVOI EN COURS...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                city: document.getElementById('city').value,
                whatsapp: document.getElementById('whatsapp').value,
                link: document.getElementById('link').value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("Candidature reçue ! Ton talent est désormais dans le LAB.");
                this.reset();
            } catch (error) {
                alert("Erreur lors de l'envoi. Vérifie ta connexion.");
            } finally {
                btn.innerText = "Envoyer ma candidature";
                btn.disabled = false;
            }
        };

        async function fetchCandidatures() {
            const list = document.getElementById('candidaturesList');
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            list.innerHTML = "";
https://script.google.com/macros/s/AKfycbzDYGuWJa-ha4Yp5sZu7z6X4uC2GNSHjIo4r_S5YFAtAHhGPoJhA8v-E935gM6SvStaHQ/exec
try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                loading.style.display = 'none';
                
                data.reverse().forEach(app => {
                    const card = document.createElement('div');
                    card.className = "glass-card p-6 rounded-3xl flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold text-xl">${app.name}</h3>
                            <p class="text-xs text-gray-500 uppercase">${app.city} • ${app.whatsapp}</p>
                        </div>
                        <a href="${app.link}" target="_blank" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Voir Démo</a>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                loading.innerText = "Impossible de charger les données.";
            }
        }

        function toggleAdmin() {
            const pass = prompt("Accès Staff :");
            if (pass === "228") {
                showSection('admin');
                fetchCandidatures();
            }
        }

        function showSection(type) {
            if (type === 'admin') {
                document.getElementById('public-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
            } else {
                document.getElementById('admin-section').classList.add('hidden');
                document.getElementById('public-section').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
