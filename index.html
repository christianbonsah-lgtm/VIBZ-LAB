<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB - Studio & Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            min-height: 100vh;
        }

        /* Image de fond sombre (Studio/Concert) */
        .bg-studio {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .accent-color { color: #FFD700; }
        .bg-accent { background-color: #FFD700; }
        
        .notification-dot { 
            position: absolute; top: -2px; right: -2px; 
            width: 8px; height: 8px; 
            background: #ff0000; border-radius: 50%; display: none; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-studio flex flex-col">

    <!-- Barre de Navigation Supérieure -->
    <nav class="w-full flex justify-between items-center px-6 md:px-12 py-6 z-50">
        <!-- Logo en haut à gauche -->
        <div class="cursor-pointer" onclick="showView('home')">
            <h1 class="text-2xl font-black tracking-tighter italic">VIBZ <span class="accent-color">LAB</span></h1>
        </div>

        <!-- Accès Staff en haut à droite -->
        <div class="relative">
            <div id="admin-dot" class="notification-dot"></div>
            <button onclick="promptAdmin()" class="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-400 hover:text-white transition">
                Staff Access
            </button>
        </div>
    </nav>

    <!-- Contenu Principal -->
    <main id="main-content" class="flex-grow flex flex-col items-center px-6">
        <!-- Injecté dynamiquement -->
    </main>

    <!-- Footer Simple -->
    <footer class="py-8 text-center">
        <p class="text-[8px] text-zinc-600 uppercase tracking-widest">© 2026 Vibz Lab • Togo Production Hub</p>
    </footer>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentView = 'home';

        // Écouteur de notifications
        db.ref('registrations').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && currentView !== 'admin') document.getElementById('admin-dot').style.display = 'block';
            if (currentView === 'admin') renderAdmin(data);
        });

        function showView(viewName) {
            currentView = viewName;
            const container = document.getElementById('main-content');
            
            if (viewName === 'home') {
                container.innerHTML = `
                    <div class="max-w-3xl w-full text-center py-20 space-y-8 animate-in">
                        <div class="space-y-2">
                            <h2 class="text-6xl md:text-8xl font-black tracking-tighter leading-none">VIBE <br><span class="accent-color italic">DIFFERENT.</span></h2>
                            <p class="text-zinc-400 text-xs md:text-sm uppercase tracking-[0.4em] mt-6">Streaming • Podcast • Studio Production</p>
                        </div>
                        
                        <p class="text-zinc-500 max-w-lg mx-auto text-sm leading-relaxed">
                            La nouvelle plaque tournante de la culture digitale au Togo. Nous donnons une voix aux créateurs de Lomé à Dapaong.
                        </p>

                        <div class="pt-10">
                            <button onclick="showView('register')" class="bg-accent text-black px-10 py-5 font-black uppercase text-xs tracking-widest hover:brightness-110 transition scale-100 hover:scale-105 active:scale-95">
                                S'inscrire au Lab
                            </button>
                        </div>
                    </div>
                `;
            } 
            
            else if (viewName === 'register') {
                container.innerHTML = `
                    <div class="max-w-md w-full glass p-8 md:p-12 mt-10 animate-in">
                        <h2 class="text-3xl font-black uppercase italic mb-2">Inscription</h2>
                        <p class="text-zinc-500 text-[10px] tracking-widest uppercase mb-10 border-l-2 border-yellow-500 pl-4">Rejoignez la Zone</p>
                        
                        <div class="space-y-4">
                            <input type="text" id="name" placeholder="NOM D'ARTISTE" class="w-full p-4 bg-black/40 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded">
                            <input type="text" id="city" placeholder="VILLE" class="w-full p-4 bg-black/40 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded">
                            <input type="tel" id="phone" placeholder="WHATSAPP (ex: 228...)" class="w-full p-4 bg-black/40 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded">
                            
                            <button onclick="handleRegister()" class="w-full bg-accent text-black py-5 font-black uppercase text-xs tracking-widest mt-6">Confirmer</button>
                            <button onclick="showView('home')" class="w-full text-zinc-500 py-2 text-[10px] font-bold uppercase tracking-widest">Retour</button>
                        </div>
                    </div>
                `;
            }

            else if (viewName === 'success') {
                container.innerHTML = `
                    <div class="text-center py-32 animate-in">
                        <h2 class="text-5xl font-black accent-color italic">MERCI.</h2>
                        <p class="text-zinc-400 text-xs uppercase tracking-widest mt-4">Ton talent est désormais dans nos radars.</p>
                        <button onclick="showView('home')" class="mt-12 text-[10px] font-black underline uppercase tracking-widest">Accueil</button>
                    </div>
                `;
            }
        }

        function handleRegister() {
            const name = document.getElementById('name').value;
            const city = document.getElementById('city').value;
            const phone = document.getElementById('phone').value;
            if(name && city && phone) {
                db.ref('registrations').push({ name, city, phone, date: Date.now() });
                showView('success');
            } else { alert("Champs manquants."); }
        }

        function promptAdmin() {
            const pass = prompt("CODE STAFF :");
            if (pass === "1120") {
                document.getElementById('admin-dot').style.display = 'none';
                showView('admin');
                db.ref('registrations').once('value', (s) => renderAdmin(s.val()));
            }
        }

        function deleteArtist(artistId) {
            if(confirm("Supprimer ?")) db.ref('registrations/' + artistId).remove();
        }

        function renderAdmin(data) {
            const container = document.getElementById('main-content');
            let html = '<div class="flex justify-between items-center w-full max-w-2xl mt-10 mb-8"><h2 class="text-2xl font-black accent-color uppercase italic">Dashboard</h2><button onclick="showView(\'home\')" class="text-[10px] text-white/40 uppercase font-bold tracking-widest">Quitter</button></div>';
            
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const reg = data[id];
                    html += `
                    <div class="w-full max-w-2xl glass p-6 mb-4 flex justify-between items-center animate-in">
                        <div>
                            <p class="font-black text-white uppercase italic text-lg leading-none">${reg.name}</p>
                            <p class="text-[9px] text-zinc-500 uppercase tracking-widest mt-2">${reg.city}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${reg.phone.replace(/\+/g, '')}" target="_blank" class="bg-green-600/10 text-green-500 px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded border border-green-500/20">Chat</a>
                            <button onclick="deleteArtist('${id}')" class="bg-red-600/10 text-red-500 px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded border border-red-500/20">Suppr</button>
                        </div>
                    </div>`;
                });
            } else { html += '<p class="text-zinc-600 py-20 italic">Liste vide.</p>'; }
            container.innerHTML = `<div class="w-full flex flex-col items-center">${html}</div>`;
        }

        showView('home');
    </script>
</body>
</html>
