<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB - Digital Production & Media Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            scroll-behavior: smooth; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* DÉGRADÉS & PALETTE COMMUNE */
        .text-gradient {
            background: linear-gradient(to right, #d946ef, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .accent-magenta { color: #d946ef; }
        .accent-cyan { color: #06b6d4; }
        
        .bg-gradient-accent {
            background: linear-gradient(135deg, #d946ef, #3b82f6);
            color: white;
        }
        .bg-gradient-accent:hover {
            background: linear-gradient(135deg, #e879f9, #60a5fa);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.25);
        }

        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .step-card { transition: 0.4s; border-top: 2px solid transparent; position: relative; overflow: hidden; }
        .step-num { font-size: 40px; font-weight: 900; opacity: 0.08; position: absolute; top: 10px; right: 20px; }

        /* ==========================================================================
           GESTION AUTOMATIQUE DU MODE DE L'UTILISATEUR (PAR DÉFAUT : LIGHT MOD)
           ========================================================================== */
        
        /* PAR DÉFAUT : MODE CLAIR (LIGHT MODE) */
        body { background-color: #f9fafb; color: #111827; }
        .bg-studio {
            background: linear-gradient(rgba(249, 250, 251, 0.93), rgba(249, 250, 251, 0.98)), 
                        url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        }
        .step-card:hover { 
            border-top: 2px solid #06b6d4; background: rgba(255, 255, 255, 0.75);
            transform: translateY(-4px); box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.08);
        }
        .nav-container { background: rgba(255, 255, 255, 0.7); border-color: rgba(229, 231, 235, 0.5); }
        .nav-pill { background: rgba(243, 244, 246, 0.8); border-color: rgba(229, 231, 235, 0.5); }
        .nav-link { color: #6b7280; }
        .nav-link:hover, .nav-link.active { color: #111827; }
        .footer-container { background: rgba(255, 255, 255, 0.4); border-color: rgba(229, 231, 235, 0.6); }
        .input-box { background: #ffffff; border-color: #e5e7eb; color: #111827; }
        .input-box-select { background: #ffffff; border-color: #e5e7eb; color: #111827; }

        /* DÉTECTION DU MODE SOMBRE DU TÉLÉPHONE (DARK MODE) */
        @media (prefers-color-scheme: dark) {
            body { background-color: #030712; color: #f3f4f6; }
            .bg-studio {
                background: linear-gradient(rgba(3, 7, 18, 0.95), rgba(3, 7, 18, 1)), 
                            url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1920&q=80');
                background-size: cover; background-position: center; background-attachment: fixed;
            }
            .glass { 
                background: rgba(255, 255, 255, 0.03); 
                backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.08); 
                box-shadow: none;
            }
            .step-card:hover { 
                border-top: 2px solid #06b6d4; background: rgba(6, 182, 212, 0.03);
                transform: translateY(-2px); box-shadow: none;
            }
            .text-gray-900 { color: #ffffff !important; }
            .text-gray-500 { color: #9ca3af !important; }
            .nav-container { background: rgba(3, 7, 18, 0.8); border-color: rgba(255, 255, 255, 0.05); }
            .nav-pill { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.05); }
            .nav-link { color: #9ca3af; }
            .nav-link:hover, .nav-link.active { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
            .footer-container { background: rgba(3, 7, 18, 0.4); border-color: rgba(255, 255, 255, 0.05); }
            .input-box { background: rgba(255, 255, 255, 0.05); border-color: #1f2937; color: #ffffff; }
            .input-box-select { background: #030712; border-color: #1f2937; color: #ffffff; }
            .border-gray-200, .border-gray-300 { border-color: rgba(255, 255, 255, 0.08) !important; }
        }

        .nav-link.active { border-bottom: 2px solid #06b6d4; padding-bottom: 4px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        @media (prefers-color-scheme: dark) { ::-webkit-scrollbar-thumb { background: #1f2937; } }
    </style>
</head>
<body class="bg-studio flex flex-col">

    <nav class="nav-container w-full flex flex-col md:flex-row justify-between items-center px-6 md:px-12 py-4 z-50 gap-6 sticky top-0 backdrop-blur-xl border-b">

            <img src="image_3ec25b.png" alt="VIBZ LAB Logo" class="h-16 w-auto object-contain">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",

            const container = document.getElementById('main-content');
            window.scrollTo(0,0);
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + (['register', 'booking'].includes(viewName) ? 'home' : viewName));

            if (viewName === 'home') {
                container.innerHTML = `

                            <span class="text-blue-600 dark:text-cyan-400 text-[10px] font-bold uppercase tracking-[0.5em] bg-blue-50 dark:bg-cyan-950/30 border border-blue-200 dark:border-cyan-800/40 px-6 py-2 rounded-full">The New Media Era</span>
                            <h2 class="text-6xl md:text-8xl font-black tracking-tighter leading-none text-gray-900">L'IMPACT PAR <br><span class="text-gradient uppercase">L'IMAGE.</span></h2>
                            <p class="text-gray-500 text-sm md:text-base max-w-2xl mx-auto leading-relaxed">"Vibz Lab redéfinit la création au Togo. Nous fusionnons luxe urbain et excellence technologique."</p>
                        </div>
                        <div class="flex flex-col md:flex-row justify-center gap-6 pt-8">
                            <button onclick="document.getElementById('vision-section').scrollIntoView({behavior:'smooth'})" class="bg-gradient-accent text-white px-12 py-5 font-black uppercase text-xs tracking-widest transition rounded-lg">Notre Vision</button>
                            <button onclick="showView('services')" class="border border-gray-300 text-gray-700 dark:text-gray-300 px-12 py-5 font-black uppercase text-xs tracking-widest hover:bg-gray-50 dark:hover:bg-white/5 transition rounded-lg">Réserver une Session</button>
                        </div>
                    </div>

                    <div id="vision-section" class="max-w-6xl w-full py-24 border-t border-gray-200">
                        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                            <div class="max-w-xl">
                                <h3 class="text-3xl md:text-4xl font-black uppercase text-gradient mb-4 leading-none">OBJECTIFS & STRATÉGIE</h3>
                                <p class="text-gray-400 text-xs uppercase tracking-widest font-bold">Construire l'écosystème média de demain.</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="glass p-10 rounded-2xl step-card"><span class="step-num text-gray-900">01</span><h4 class="font-black text-gray-900 uppercase text-lg mb-4 tracking-tight">Émergence</h4><p class="text-xs text-gray-500 leading-relaxed mb-6">Lancement de la <b class="text-blue-600 dark:text-cyan-400">Tournée Découverte</b>. Identifier les pépites urbaines et offrir une plateforme premium.</p><button onclick="showView('tournee')" class="text-[9px] font-black accent-cyan uppercase tracking-widest border border-gray-200 dark:border-gray-800 bg-white dark:bg-transparent px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded transition">Voir la Tournée</button></div>
                            <div class="glass p-10 rounded-2xl step-card"><span class="step-num text-gray-900">02</span><h4 class="font-black text-gray-900 uppercase text-lg mb-4 tracking-tight">Structure</h4><p class="text-xs text-gray-500 leading-relaxed mb-6">Devenir la référence absolue pour la production de <b class="text-gradient">Podcasts</b> et de <b class="text-blue-600 dark:text-cyan-400">Live Shows</b> impactants.</p><button onclick="showView('services')" class="text-[9px] font-black accent-magenta uppercase tracking-widest border border-gray-200 dark:border-gray-800 bg-white dark:bg-transparent px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded transition">Nos Prestations</button></div>
                            <div class="glass p-10 rounded-2xl step-card opacity-50"><span class="step-num text-gray-900">03</span><h4 class="font-black text-gray-900 uppercase text-lg mb-4 tracking-tight">Expansion</h4><p class="text-xs text-gray-500 leading-relaxed mb-6">Lancement du département <b class="text-gray-900">Cinéma</b>. Exportation du modèle Vibz Lab dans la sous-région.</p><span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">En Développement</span></div>
                        </div>
                    </div>
                `;
            } 
            else if (viewName === 'tournee') {
                container.innerHTML = `<div class="max-w-6xl w-full py-20 animate-in text-center"><h2 class="text-4xl font-black uppercase text-gradient leading-none">Tournée Découverte</h2><p class="text-gray-400 text-[10px] tracking-[0.4em] uppercase mt-4">5 Régions • Togo 2026</p><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 mt-16">${['Sotouboua', 'Sokodé', 'Kara', 'Mango', 'Dapaong'].map(v => `<div class="glass p-8 border-l-4 border-cyan-400 rounded-xl group hover:bg-white dark:hover:bg-gray-900/40 transition cursor-pointer" onclick="showView('register')"><h3 class="font-black text-xl uppercase mb-1 text-gray-900 group-hover:text-cyan-500">${v}</h3><p class="text-[8px] text-gray-400 uppercase tracking-widest mb-6">Casting Ouvert</p><span class="text-[9px] font-black accent-magenta uppercase tracking-tighter">Postuler →</span></div>`).join('')}</div></div>`;
            }
            else if (viewName === 'services') {
                container.innerHTML = `<div class="max-w-5xl w-full py-20 animate-in text-center"><h2 class="text-4xl font-black uppercase mb-16 leading-none text-gray-900">Nos <span class="text-gradient">Prestations</span></h2><div class="grid grid-cols-1 md:grid-cols-3 gap-8"><div class="glass p-12 rounded-2xl flex flex-col items-center"><div class="text-4xl mb-6">🎙️</div><h3 class="font-black uppercase text-xl mb-4 text-gray-900">Podcast</h3><p class="text-xs text-gray-400 mb-8 leading-relaxed">Set design & Mixage Live.</p><button onclick="showBooking('Podcast')" class="bg-gradient-accent text-white px-8 py-3 text-[10px] font-black uppercase tracking-widest rounded-md">Réserver</button></div><div class="glass p-12 rounded-2xl flex flex-col items-center"><div class="text-4xl mb-6">📹</div><h3 class="font-black uppercase text-xl mb-4 text-gray-900">Live Show</h3><p class="text-xs text-gray-400 mb-8 leading-relaxed">Captation 4K & Réalisation.</p><button onclick="showBooking('Live Show')" class="bg-gradient-accent text-white px-8 py-3 text-[10px] font-black uppercase tracking-widest rounded-md">Réserver</button></div><div class="glass p-12 rounded-2xl opacity-40 flex flex-col items-center relative overflow-hidden"><div class="absolute top-4 right-[-20px] bg-gradient-to-r from-purple-500 to-pink-500 text-white text-[8px] font-bold px-8 py-1 rotate-45 uppercase">Bientôt</div><div class="text-4xl mb-6">🎬</div><h3 class="font-black uppercase text-xl mb-4 text-gray-900">Clip Vidéo</h3><p class="text-xs text-gray-400 mb-8 leading-relaxed">Cinématographie.</p><span class="text-[9px] font-black text-gray-400 uppercase">Indisponible</span></div></div></div>`;
            }
            else if (viewName === 'register') {

        }

        function showBooking(serviceType) {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="max-w-md w-full glass p-12 mt-10 rounded-2xl animate-in"><h2 class="text-3xl font-black uppercase mb-2 border-l-4 pl-6 text-gray-900" style="border-image: linear-gradient(to bottom, #06b6d4, #3b82f6) 1;">${serviceType}</h2><p class="text-gray-400 text-[9px] tracking-[0.3em] uppercase mb-10 pl-6 font-bold">Réserver une session lab</p><div class="space-y-4"><input type="text" id="book-name" placeholder="NOM COMPLET / STRUCTURE" class="w-full p-5 input-box border rounded-lg text-sm focus:border-cyan-400 outline-none transition"><input type="date" id="book-date" class="w-full p-5 input-box border rounded-lg text-sm focus:border-cyan-400 outline-none transition"><textarea id="book-desc" placeholder="DÉCRIVEZ VOTRE BESOIN..." class="w-full p-5 input-box border rounded-lg text-sm focus:border-cyan-400 outline-none h-32 transition"></textarea><input type="tel" id="book-phone" placeholder="CONTACT WHATSAPP" class="w-full p-5 input-box border rounded-lg text-sm focus:border-cyan-400 outline-none transition"><button onclick="handleServiceBooking('${serviceType}')" class="w-full bg-gradient-accent text-white py-6 rounded-lg font-black uppercase text-[10px] tracking-[0.3em] mt-8">Confirmer la demande</button></div></div>`;
        }

        function showSuccess(title, subtitle) {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="flex flex-col items-center justify-center py-32 text-center animate-in"><img src="image_3ec25b.png" alt="Logo" class="h-24 w-auto object-contain mb-12"><h2 class="text-6xl md:text-7xl font-black uppercase text-gradient tracking-tighter mb-6">${title}</h2><p class="text-gray-400 text-xs md:text-sm uppercase tracking-[0.4em] max-w-lg leading-relaxed px-6 font-bold">${subtitle}</p><button onclick="showView('home')" class="mt-20 text-[10px] font-black
