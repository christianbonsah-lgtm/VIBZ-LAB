<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB - Digital Production & Media Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }

        .bg-studio {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .accent-color { color: #FFD700; }
        .bg-accent { background-color: #FFD700; }
        .notification-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: none; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .animate-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Style spécifique pour le Monogramme VL */
        .vl-box {
            background-color: #FFD700;
            color: black;
            padding: 2px 8px;
            font-weight: 900;
            font-style: italic;
            border-radius: 2px;
            margin-right: 10px;
        }
    </style>
</head>
<body class="bg-studio flex flex-col">

    <!-- Navigation avec Logo VL -->
    <nav class="w-full flex justify-between items-center px-6 md:px-12 py-8 z-50">
        <div class="flex items-center cursor-pointer" onclick="showView('home')">
            <span class="vl-box text-xl">VL</span>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">VIBZ <span class="accent-color">LAB</span></h1>
        </div>
        <div class="relative">
            <div id="admin-dot" class="notification-dot"></div>
            <button onclick="promptAdmin()" class="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition">Staff Access</button>
        </div>
    </nav>

    <main id="main-content" class="flex-grow flex flex-col items-center px-6"></main>

    <footer class="py-10 text-center border-t border-white/5">
        <p class="text-[9px] text-zinc-600 uppercase tracking-widest">© 2026 Vibz Lab • Excellence Créative au Togo</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentView = 'home';

        db.ref('registrations').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && currentView !== 'admin') document.getElementById('admin-dot').style.display = 'block';
            if (currentView === 'admin') renderAdmin(data);
        });

        function showView(viewName) {
            currentView = viewName;
            const container = document.getElementById('main-content');
            
            if (viewName === 'home') {
                container.innerHTML = `
                    <div class="max-w-4xl w-full text-center py-16 space-y-10 animate-in">
                        <div class="space-y-4">
                            <span class="text-accent text-[10px] font-bold uppercase tracking-[0.5em] border border-accent/30 px-4 py-2 rounded-full">Innovation & Media Hub</span>
                            <h2 class="text-5xl md:text-7xl font-black tracking-tighter leading-none pt-4">
                                L'ÉPICENTRE DE LA <br><span class="accent-color italic text-white">CRÉATION DIGITALE.</span>
                            </h2>
                            <p class="text-zinc-400 text-sm md:text-base max-w-2xl mx-auto leading-relaxed mt-6">
                                VIBZ LAB redéfinit les standards de la production média. Un écosystème premium dédié au streaming, aux podcasts et à l'incubation de talents créatifs au Togo.
                            </p>
                        </div>

                        <div class="flex flex-col md:flex-row justify-center gap-4 pt-4">
                            <button onclick="showView('register')" class="bg-accent text-black px-12 py-5 font-black uppercase text-xs tracking-widest hover:brightness-110 transition">
                                Devenir Partenaire
                            </button>
                            <div class="flex items-center justify-center px-8 py-5 border border-white/10 text-white/50 text-[10px] uppercase font-bold tracking-widest">
                                Visionary Hub 2026
                            </div>
                        </div>
                    </div>
                `;
            } 
            
            else if (viewName === 'register') {
                container.innerHTML = `
                    <div class="max-w-md w-full glass p-10 mt-6 animate-in">
                        <h2 class="text-2xl font-black uppercase italic mb-2 tracking-tighter">Formulaire Partenaire</h2>
                        <p class="text-zinc-500 text-[9px] tracking-[0.3em] uppercase mb-10 border-l-2 border-yellow-500 pl-4 italic">Rejoignez le mouvement</p>
                        <div class="space-y-4">
                            <input type="text" id="name" placeholder="NOM COMPLET / NOM D'ARTISTE" class="w-full p-4 bg-white/5 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded-sm transition">
                            <input type="text" id="city" placeholder="VILLE (EX: LOMÉ, KARA, SOTOUBOUA)" class="w-full p-4 bg-white/5 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded-sm transition">
                            <input type="tel" id="phone" placeholder="WHATSAPP (AVEC INDICATIF PAYS)" class="w-full p-4 bg-white/5 border border-zinc-800 text-sm focus:border-yellow-500 outline-none rounded-sm transition">
                            <button onclick="handleRegister()" class="w-full bg-accent text-black py-5 font-black uppercase text-xs tracking-widest mt-6 hover:scale-[1.01] transition-transform">Envoyer au Lab</button>
                            <button onclick="showView('home')" class="w-full text-zinc-600 py-2 text-[9px] font-bold uppercase tracking-widest">Retour</button>
                        </div>
                    </div>
                `;
            }

            else if (viewName === 'success') {
                container.innerHTML = `<div class="text-center py-32 animate-in"><h2 class="text-5xl font-black accent-color italic">REÇU.</h2><p class="text-zinc-500 text-[10px] uppercase tracking-widest mt-4">Notre département stratégique analyse votre profil.</p><button onclick="showView('home')" class="mt-12 text-[10px] font-bold underline uppercase tracking-widest">Accueil</button></div>`;
            }
        }

        function handleRegister() {
            const name = document.getElementById('name').value;
            const city = document.getElementById('city').value;
            const phone = document.getElementById('phone').value;
            if(name && city && phone) {
                db.ref('registrations').push({ name, city, phone, date: Date.now() });
                showView('success');
            } else { alert("Informations requises."); }
        }

        function promptAdmin() {
            if (prompt("CODE STAFF :") === "1120") {
                document.getElementById('admin-dot').style.display = 'none';
                showView('admin');
                db.ref('registrations').once('value', (s) => renderAdmin(s.val()));
            }
        }

        function deleteArtist(artistId) {
            if(confirm("Confirmer la suppression ?")) db.ref('registrations/' + artistId).remove();
        }

        function renderAdmin(data) {
            const container = document.getElementById('main-content');
            let html = '<div class="flex justify-between items-center w-full max-w-2xl mt-10 mb-8"><h2 class="text-xl font-black accent-color uppercase italic">Gestion des Profils</h2><button onclick="showView(\'home\')" class="text-[9px] text-white/30 uppercase font-bold border border-white/10 px-4 py-2">Fermer</button></div>';
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const reg = data[id];
                    html += `
                    <div class="w-full max-w-2xl glass p-6 mb-4 flex justify-between items-center">
                        <div>
                            <p class="font-black text-white uppercase italic text-lg leading-none">${reg.name}</p>
                            <p class="text-[9px] text-zinc-600 uppercase tracking-widest mt-2">${reg.city} • ${new Date(reg.date).toLocaleDateString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${reg.phone.replace(/\+/g, '')}" target="_blank" class="bg-green-600/10 text-green-500 px-4 py-2 text-[8px] font-black uppercase tracking-widest rounded border border-green-500/20">Contact</a>
                            <button onclick="deleteArtist('${id}')" class="bg-red-600/10 text-red-500 px-4 py-2 text-[8px] font-black uppercase tracking-widest rounded border border-red-600/20">Suppr</button>
                        </div>
                    </div>`;
                });
            } else { html += '<p class="text-zinc-600 py-20 italic text-center">Aucun dossier enregistré.</p>'; }
            container.innerHTML = `<div class="w-full flex flex-col items-center">${html}</div>`;
        }

        showView('home');
    </script>
</body>
</html>
