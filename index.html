<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBZ LAB | Official Tour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --gold: #D4AF37;
            --gold-dark: #B38D46;
            --bg: #0A0A0A;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            background: rgba(212, 175, 55, 0.05);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            outline: none;
        }

        .city-chip {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .city-chip.active {
            background: var(--gold);
            color: black;
            border-color: var(--gold);
            font-weight: 800;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-main:active { transform: scale(0.96); }

        .gold-glow {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up { animation: slideUp 0.5s ease forwards; }
    </style>
</head>
<body class="min-h-screen selection:bg-[#D4AF37] selection:text-black">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#D4AF37] rounded-xl flex items-center justify-center rotate-3">
                <i class="fas fa-bolt text-black text-xl"></i>
            </div>
            <span class="font-extrabold text-2xl tracking-tighter uppercase italic">Vibz<span class="text-[#D4AF37]">Lab</span></span>
        </div>
        <button onclick="openLogin()" class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/30 hover:text-[#D4AF37] transition-colors">
            Espace Admin
        </button>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">
        
        <!-- Formulaire Artiste -->
        <div id="artist-view" class="animate-slide-up">
            <header class="mb-10 text-center">
                <h1 class="text-5xl font-extrabold uppercase italic mb-3">Rejoins la <span class="text-[#D4AF37] gold-glow">Tournée</span></h1>
                <p class="text-white/40 text-xs font-bold uppercase tracking-[0.3em]">L'excellence artistique au Togo</p>
            </header>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl border-t border-white/10">
                <form id="regForm" class="space-y-8">
                    <!-- Champ Nom -->
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Comment on t'appelle ?</label>
                        <input type="text" id="name" required placeholder="Nom de scène..." 
                            class="input-premium w-full p-5 rounded-2xl text-white font-bold text-lg placeholder:text-white/10">
                    </div>
                    
                    <!-- Sélecteur de Villes (Nouveau Format Chips) -->
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Choisis ta ville étape</label>
                        <div class="flex flex-wrap gap-2" id="city-selector">
                            <div class="city-chip px-5 py-3 rounded-full text-xs font-bold uppercase" data-value="Sotouboua">Sotouboua</div>
                            <div class="city-chip px-5 py-3 rounded-full text-xs font-bold uppercase" data-value="Sokodé">Sokodé</div>
                            <div class="city-chip px-5 py-3 rounded-full text-xs font-bold uppercase" data-value="Kara">Kara</div>
                            <div class="city-chip px-5 py-3 rounded-full text-xs font-bold uppercase" data-value="Mango">Mango</div>
                            <div class="city-chip px-5 py-3 rounded-full text-xs font-bold uppercase" data-value="Dapaong">Dapaong</div>
                        </div>
                        <input type="hidden" id="selectedCity" required>
                    </div>

                    <!-- Champ Contact -->
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Numéro WhatsApp (8 chiffres)</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-white/20 font-bold">+228</span>
                            <input type="tel" id="phone" required maxlength="8" placeholder="00 00 00 00" 
                                class="input-premium w-full p-5 pl-16 rounded-2xl text-white font-bold text-lg tracking-widest placeholder:text-white/10">
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-main w-full py-5 rounded-2xl text-base shadow-[0_10px_30px_rgba(212,175,55,0.2)]">
                        Confirmer l'inscription
                    </button>
                </form>
            </div>
        </div>

        <!-- Dashboard Staff -->
        <div id="staff-view" class="hidden animate-slide-up">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-4xl font-extrabold uppercase italic gold-glow">Candidatures</h2>
                    <p id="stats-count" class="text-white/40 text-[10px] uppercase font-black mt-2">Chargement des données...</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="generatePDF()" class="w-12 h-12 glass-card rounded-xl flex items-center justify-center text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black">
                        <i class="fas fa-download"></i>
                    </button>
                    <button onclick="location.reload()" class="w-12 h-12 glass-card rounded-xl flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>

            <div id="data-list" class="space-y-4">
                <!-- Dynamique -->
            </div>
        </div>
    </main>

    <!-- Modal Succès -->
    <div id="success-msg" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl flex items-center justify-center z-50 p-6">
        <div class="text-center space-y-6">
            <div class="w-24 h-24 bg-[#D4AF37] rounded-full mx-auto flex items-center justify-center shadow-[0_0_50px_rgba(212,175,55,0.4)]">
                <i class="fas fa-check text-4xl text-black"></i>
            </div>
            <h3 class="text-4xl font-black uppercase italic">Validé !</h3>
            <p class="text-white/50 max-w-xs mx-auto">Ton profil est désormais dans notre base de données. Prépare ton meilleur show.</p>
            <button onclick="location.reload()" class="btn-main px-12 py-4 rounded-full text-xs">Retour à l'accueil</button>
        </div>
    </div>

    <!-- Modal Admin -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs text-center border-white/10">
            <h4 class="text-[10px] font-black uppercase text-white/30 mb-8 tracking-[0.3em]">Code de sécurité</h4>
            <div class="flex gap-2 justify-center mb-8">
                <input type="password" id="pass" maxlength="3" class="w-24 bg-white/5 border-b-2 border-[#D4AF37] text-4xl text-center font-black focus:outline-none text-[#D4AF37]">
            </div>
            <button onclick="checkPass()" class="btn-main w-full py-4 rounded-xl text-xs mb-4">Accéder</button>
            <button onclick="closeLogin()" class="text-white/20 text-[10px] font-bold uppercase tracking-widest">Annuler</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vibz-tour-v2';

        let artists = [];
        let currentUser = null;
        let unsubscribeData = null;

        // Gestion du sélecteur de villes personnalisé
        const chips = document.querySelectorAll('.city-chip');
        chips.forEach(chip => {
            chip.onclick = () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                document.getElementById('selectedCity').value = chip.dataset.value;
            };
        });

        // AUTH
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        initAuth();

        // Enregistrement
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const city = document.getElementById('selectedCity').value;
            if (!city) {
                alert("Choisis une ville étape !");
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "TRAITEMENT...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                    name: document.getElementById('name').value,
                    city: city,
                    phone: document.getElementById('phone').value,
                    date: serverTimestamp()
                });
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (err) {
                btn.innerText = "ERREUR - RÉESSAYER";
                btn.disabled = false;
            }
        };

        // ADMIN LOGIC
        window.openLogin = () => document.getElementById('login-modal').classList.remove('hidden');
        window.closeLogin = () => document.getElementById('login-modal').classList.add('hidden');
        
        window.checkPass = () => {
            if(document.getElementById('pass').value === "228") {
                closeLogin();
                document.getElementById('artist-view').classList.add('hidden');
                document.getElementById('staff-view').classList.remove('hidden');
                loadStaffData();
            }
        };

        function loadStaffData() {
            if (!currentUser) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), orderBy('date', 'desc'));
            
            unsubscribeData = onSnapshot(q, (snap) => {
                const list = document.getElementById('data-list');
                list.innerHTML = '';
                artists = [];
                
                document.getElementById('stats-count').innerText = `${snap.size} Candidatures reçues`;

                snap.forEach(d => {
                    const data = d.data();
                    artists.push(data);
                    
                    const div = document.createElement('div');
                    div.className = "glass-card p-6 rounded-3xl flex items-center justify-between border-l-4 border-[#D4AF37] animate-slide-up";
                    div.innerHTML = `
                        <div class="flex-1">
                            <p class="text-[10px] font-black text-[#D4AF37] uppercase tracking-widest mb-1">${data.city}</p>
                            <h4 class="text-xl font-bold uppercase truncate pr-4">${data.name}</h4>
                        </div>
                        <a href="https://wa.me/228${data.phone}" target="_blank" class="w-12 h-12 bg-green-500/10 text-green-500 rounded-2xl flex items-center justify-center hover:bg-green-500 hover:text-white transition-all">
                            <i class="fab fa-whatsapp text-xl"></i>
                        </a>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.generatePDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("VIBZ LAB TOUR - STAFF LIST", 14, 20);
            doc.autoTable({
                startY: 30,
                head: [['Artiste', 'Ville', 'WhatsApp']],
                body: artists.map(a => [a.name, a.city, a.phone]),
                headStyles: { fillColor: [212, 175, 55] }
            });
            doc.save('VibzLab_Staff.pdf');
        };
    </script>
</body>
</html>
