<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB - Future of Sounds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .accent-color { color: #FFD700; }
        .bg-accent { background-color: #FFD700; }
        .notification-dot { position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- Header Fixe -->
    <header class="w-full text-center py-8 z-50 cursor-pointer" onclick="showView('home')">
        <h1 class="text-4xl font-black tracking-tighter italic">VIBZ <span class="accent-color">LAB</span></h1>
    </header>

    <!-- Zone de Contenu Dynamique -->
    <main id="main-content" class="w-full max-w-4xl flex-grow flex flex-col px-6">
        <!-- Injecté par le Script -->
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-10">
        <div class="relative inline-block">
            <div id="admin-dot" class="notification-dot"></div>
            <button onclick="promptAdmin()" class="text-[9px] text-zinc-800 hover:text-zinc-400 transition uppercase tracking-[0.3em]">Staff Control</button>
        </div>
        <p class="text-[8px] text-zinc-600 mt-4 tracking-widest uppercase">© 2026 Vibz Lab Togo • Design for Future</p>
    </footer>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentView = 'home';

        // Écouteur en temps réel
        db.ref('registrations').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && currentView !== 'admin') document.getElementById('admin-dot').style.display = 'block';
            if (currentView === 'admin') renderAdmin(data);
        });

        function showView(viewName) {
            currentView = viewName;
            const container = document.getElementById('main-content');
            window.scrollTo(0,0);

            if (viewName === 'home') {
                container.innerHTML = `
                    <div class="flex flex-col items-center text-center space-y-12 py-10 animate-fade-in">
                        <div class="space-y-4">
                            <h2 class="text-6xl md:text-8xl font-black tracking-tighter leading-none">THE <span class="accent-color italic">ZONE</span> FOR CREATIVES</h2>
                            <p class="text-zinc-500 max-w-lg mx-auto text-sm md:text-base leading-relaxed uppercase tracking-widest">
                                Basé au Togo, VIBZ LAB est une plateforme de streaming et un studio de production dédié aux podcasts, talk-shows et talents émergents.
                            </p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-3xl">
                            <div class="glass-card p-6 text-left">
                                <h3 class="accent-color font-bold mb-2 uppercase text-xs tracking-tighter">Production</h3>
                                <p class="text-[11px] text-zinc-400">Qualité studio professionnelle pour vos contenus audio et vidéo.</p>
                            </div>
                            <div class="glass-card p-6 text-left">
                                <h3 class="accent-color font-bold mb-2 uppercase text-xs tracking-tighter">Streaming</h3>
                                <p class="text-[11px] text-zinc-400">Diffusez vos shows sur une plateforme moderne et intuitive.</p>
                            </div>
                            <div class="glass-card p-6 text-left">
                                <h3 class="accent-color font-bold mb-2 uppercase text-xs tracking-tighter">Visibilité</h3>
                                <p class="text-[11px] text-zinc-400">Mise en avant des talents de Kara, Lomé et toute la sous-région.</p>
                            </div>
                        </div>

                        <button onclick="showView('register')" class="bg-accent text-black px-12 py-6 font-black uppercase text-sm tracking-widest hover:scale-105 transition-transform">
                            Rejoindre le Lab
                        </button>
                    </div>
                `;
            } 
            
            else if (viewName === 'register') {
                container.innerHTML = `
                    <div class="max-w-md mx-auto w-full py-10 space-y-8 animate-fade-in">
                        <div class="text-center">
                            <h2 class="text-3xl font-black uppercase italic">S'inscrire</h2>
                            <p class="text-zinc-500 text-[10px] tracking-widest uppercase">Remplissez vos informations</p>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="name" placeholder="NOM D'ARTISTE" class="w-full p-5 bg-zinc-900 border border-zinc-800 text-sm focus:border-yellow-500 outline-none transition">
                            <input type="text" id="city" placeholder="VILLE" class="w-full p-5 bg-zinc-900 border border-zinc-800 text-sm focus:border-yellow-500 outline-none transition">
                            <input type="tel" id="phone" placeholder="WHATSAPP (ex: 228...)" class="w-full p-5 bg-zinc-900 border border-zinc-800 text-sm focus:border-yellow-500 outline-none transition">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="showView('home')" class="w-1/3 border border-zinc-800 py-5 text-[10px] font-bold uppercase tracking-widest">Annuler</button>
                            <button onclick="handleRegister()" class="w-2/3 bg-accent text-black py-5 font-black uppercase text-xs tracking-widest">Valider</button>
                        </div>
                    </div>
                `;
            }

            else if (viewName === 'success') {
                container.innerHTML = `
                    <div class="text-center py-20 space-y-6">
                        <div class="text-6xl text-yellow-500">✓</div>
                        <h2 class="text-4xl font-black italic">DOSSIER ENVOYÉ</h2>
                        <p class="text-zinc-500 text-sm uppercase tracking-widest">Le Lab va analyser ton profil.</p>
                        <button onclick="showView('home')" class="bg-white text-black px-8 py-4 font-bold uppercase text-[10px] tracking-widest mt-10">Retour à l'accueil</button>
                    </div>
                `;
            }
        }

        function handleRegister() {
            const name = document.getElementById('name').value;
            const city = document.getElementById('city').value;
            const phone = document.getElementById('phone').value;
            if(name && city && phone) {
                db.ref('registrations').push({ name, city, phone, date: Date.now() });
                showView('success');
            } else { alert("Merci de remplir tous les champs."); }
        }

        function promptAdmin() {
            const pass = prompt("CODE STAFF :");
            if (pass === "1120") {
                document.getElementById('admin-dot').style.display = 'none';
                showView('admin');
                db.ref('registrations').once('value', (s) => renderAdmin(s.val()));
            }
        }

        function deleteArtist(artistId) {
            if(confirm("Supprimer ce profil ?")) db.ref('registrations/' + artistId).remove();
        }

        function renderAdmin(data) {
            const container = document.getElementById('main-content');
            let html = '<div class="flex justify-between items-center mb-10 py-10"><h2 class="text-2xl font-black accent-color uppercase italic">Tableau de Bord</h2><button onclick="showView(\'home\')" class="text-xs text-zinc-500 uppercase font-bold tracking-widest underline">Quitter</button></div>';
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const reg = data[id];
                    html += `
                    <div class="glass-card p-6 mb-4 flex justify-between items-center">
                        <div>
                            <p class="font-black text-white uppercase italic text-xl leading-none">${reg.name}</p>
                            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-2">${reg.city}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${reg.phone.replace(/\+/g, '')}" target="_blank" class="bg-green-600/20 text-green-500 p-3 text-[9px] font-black uppercase tracking-widest rounded border border-green-500/20">WhatsApp</a>
                            <button onclick="deleteArtist('${id}')" class="bg-red-600/10 text-red-600 p-3 text-[9px] font-black uppercase tracking-widest rounded border border-red-600/20">Supprimer</button>
                        </div>
                    </div>`;
                });
            } else { html += '<p class="text-zinc-800 text-center py-20 italic">Aucun inscrit.</p>'; }
            container.innerHTML = `<div class="w-full">${html}</div>`;
        }

        // Initialisation
        showView('home');
    </script>
</body>
</html>
