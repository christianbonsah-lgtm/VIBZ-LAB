<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBZ LAB | Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { --gold: #D4AF37; --bg: #050505; }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
        }

        .neo-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
        }

        .neo-input:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            outline: none;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            color: black;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .hide { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center max-w-lg mx-auto w-full">
        <button id="nav-logo" class="text-xl font-bold tracking-tighter uppercase italic outline-none">
            VIBZ<span class="text-[#D4AF37]">LAB</span>
        </button>
        <button id="admin-trigger" class="text-white/20 hover:text-[#D4AF37] transition-colors p-2">
            <i class="fas fa-fingerprint text-xl"></i>
        </button>
    </nav>

    <main class="flex-1 max-w-md mx-auto w-full px-6 pb-12">
        
        <!-- SECTION FORMULAIRE -->
        <section id="view-register" class="animate-fade">
            <div class="mb-8 mt-4 text-center">
                <h2 class="text-3xl font-bold uppercase italic tracking-tighter">Tournée <span class="text-[#D4AF37]">Togo 2026</span></h2>
                <p class="text-white/40 text-[10px] uppercase tracking-[0.4em] mt-2 font-medium">Inscription Artiste</p>
            </div>

            <div class="glass-card p-8 space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-white/50 ml-1">Nom d'Artiste</label>
                    <input type="text" id="artist-name" class="neo-input w-full p-4 rounded-xl font-bold" placeholder="Votre nom de scène">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-white/50 ml-1">Ville</label>
                    <input type="text" id="artist-city" class="neo-input w-full p-4 rounded-xl font-bold" placeholder="Ex: Lomé, Kara...">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-white/50 ml-1">WhatsApp</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-[#D4AF37]">+228</span>
                        <input type="tel" id="artist-phone" maxlength="8" class="neo-input w-full p-4 pl-14 rounded-xl font-bold tracking-widest" placeholder="00000000">
                    </div>
                </div>

                <button id="submit-btn" class="gold-gradient w-full py-4 rounded-xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-gold/20 active:scale-95 transition-transform mt-4">
                    Valider Inscription
                </button>
                
                <p id="msg-error" class="text-center text-[10px] font-bold text-red-400 hide uppercase bg-red-400/10 py-3 rounded-lg border border-red-400/20"></p>
            </div>
        </section>

        <!-- SECTION LISTE ADMIN -->
        <section id="view-admin" class="hide animate-fade">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold italic uppercase tracking-tighter">Candidats</h2>
                <button id="exit-admin" class="text-[10px] bg-white/5 px-4 py-2 rounded-full uppercase font-bold text-white/60">Fermer</button>
            </div>
            
            <div id="stats" class="mb-6 px-2">
                <p class="text-[10px] text-[#D4AF37] font-bold uppercase tracking-[0.2em]" id="count-label">Chargement...</p>
            </div>

            <div id="admin-list" class="space-y-4">
                <!-- Artistes chargés ici -->
            </div>
        </section>

    </main>

    <!-- AUTH MODAL -->
    <div id="modal-auth" class="fixed inset-0 bg-black/95 z-50 hide flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass-card p-8 w-full max-w-xs text-center">
            <p class="text-[10px] uppercase tracking-widest text-white/40 mb-6 font-bold">Code Staff</p>
            <input type="password" id="admin-code" class="w-full bg-transparent border-b-2 border-[#D4AF37] text-4xl text-center outline-none mb-8 font-bold tracking-[0.5em]" placeholder="•••">
            <div class="space-y-3">
                <button id="auth-confirm" class="gold-gradient w-full py-4 rounded-xl font-bold text-xs uppercase">Vérifier</button>
                <button id="auth-cancel" class="w-full py-2 text-[10px] text-white/30 uppercase font-bold tracking-widest">Retour</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="modal-success" class="fixed inset-0 bg-black z-[100] hide flex items-center justify-center text-center p-8">
        <div class="animate-fade">
            <div class="w-20 h-20 bg-[#D4AF37] rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-gold/40">
                <i class="fas fa-check text-3xl text-black"></i>
            </div>
            <h3 class="text-3xl font-bold uppercase italic mb-2 tracking-tighter">Envoyé !</h3>
            <p class="text-white/40 text-[10px] font-bold tracking-widest uppercase leading-loose">
                Ton profil est enregistré.<br>VIBZ LAB te contactera bientôt.
            </p>
            <button id="reset-form" class="mt-10 py-3 px-8 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-[0.3em] text-[#D4AF37] hover:bg-white/5 transition-colors">
                Nouveau Profil
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vibz-lab-2026';

        let userLoaded = false;
        let adminUnsubscribe = null;

        // Navigation Instantanée
        const showView = (viewId) => {
            ['view-register', 'view-admin', 'modal-auth', 'modal-success'].forEach(id => {
                document.getElementById(id).classList.add('hide');
            });
            if(viewId) document.getElementById(viewId).classList.remove('hide');
        };

        // Reset Formulaire
        const clearForm = () => {
            document.getElementById('artist-name').value = "";
            document.getElementById('artist-city').value = "";
            document.getElementById('artist-phone').value = "";
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "Valider Inscription";
        };

        // Auth Init
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        onAuthStateChanged(auth, (u) => { if(u) userLoaded = true; });
        init();

        // Inscription
        document.getElementById('submit-btn').onclick = async () => {
            const name = document.getElementById('artist-name').value.trim();
            const city = document.getElementById('artist-city').value.trim();
            const phone = document.getElementById('artist-phone').value.trim();
            const err = document.getElementById('msg-error');

            if(!name || !city || !phone) {
                err.innerText = "CHAMPS INCOMPLETS";
                err.classList.remove('hide');
                return;
            }

            if(!userLoaded) return;

            try {
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').innerText = "ENVOI...";
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                    name, city, phone,
                    createdAt: serverTimestamp()
                });

                showView('modal-success');
            } catch (e) {
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').innerText = "Valider Inscription";
                err.innerText = "ERREUR DE CONNEXION";
                err.classList.remove('hide');
            }
        };

        // Boutons de retour instantanés
        document.getElementById('reset-form').onclick = () => {
            clearForm();
            showView('view-register');
        };

        document.getElementById('nav-logo').onclick = () => {
            clearForm();
            showView('view-register');
        };

        document.getElementById('exit-admin').onclick = () => {
            if(adminUnsubscribe) adminUnsubscribe();
            showView('view-register');
        };

        // Accès Admin
        document.getElementById('admin-trigger').onclick = () => showView('modal-auth');
        document.getElementById('auth-cancel').onclick = () => showView('view-register');
        
        document.getElementById('auth-confirm').onclick = () => {
            const code = document.getElementById('admin-code').value;
            if(code === "228") {
                document.getElementById('admin-code').value = "";
                showView('view-admin');
                loadList();
            } else {
                document.getElementById('admin-code').value = "";
                alert("CODE INCORRECT");
            }
        };

        function loadList() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            adminUnsubscribe = onSnapshot(q, (snap) => {
                const list = document.getElementById('admin-list');
                const label = document.getElementById('count-label');
                let items = [];
                snap.forEach(d => items.push(d.data()));
                
                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                label.innerText = `${items.length} CANDIDATS ENREGISTRÉS`;
                list.innerHTML = items.map(art => `
                    <div class="glass-card p-5 flex justify-between items-center animate-fade">
                        <div>
                            <p class="text-[8px] font-bold text-[#D4AF37] uppercase tracking-widest mb-1">${art.city}</p>
                            <h4 class="text-lg font-bold uppercase italic leading-none">${art.name}</h4>
                            <p class="text-white/30 text-[10px] mt-1 tracking-widest">+228 ${art.phone}</p>
                        </div>
                        <a href="https://wa.me/228${art.phone}" target="_blank" class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-[#D4AF37]">
                            <i class="fab fa-whatsapp text-xl"></i>
                        </a>
                    </div>
                `).join('');
            }, (err) => console.error(err));
        }
    </script>
</body>
</html>
