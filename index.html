<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBZ LAB | Official Tour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Bibliothèques pour le PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --gold: #D4AF37;
            --gold-dark: #B38D46;
            --bg: #0A0A0A;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            background: rgba(212, 175, 55, 0.05);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            outline: none;
        }

        .city-chip {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        .city-chip.active {
            background: var(--gold);
            color: black;
            border-color: var(--gold);
            font-weight: 800;
            transform: scale(1.05);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-main:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .gold-glow {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#D4AF37] rounded-xl flex items-center justify-center rotate-3">
                <i class="fas fa-bolt text-black text-xl"></i>
            </div>
            <span class="font-extrabold text-2xl tracking-tighter uppercase italic">Vibz<span class="text-[#D4AF37]">Lab</span></span>
        </div>
        <button id="admin-trigger" class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/30 hover:text-[#D4AF37] transition-colors">
            Espace Admin
        </button>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-4">
        
        <!-- Vue Inscription -->
        <section id="view-artist" class="animate-fade-in">
            <header class="mb-8 text-center">
                <h1 class="text-4xl font-extrabold uppercase italic mb-2">Tournée <span class="text-[#D4AF37] gold-glow">Vibz</span></h1>
                <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">L'excellence artistique au Togo</p>
            </header>

            <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-2xl">
                <form id="registrationForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Nom de scène</label>
                        <input type="text" id="artistName" required placeholder="Ex: King Vibz" 
                            class="input-premium w-full p-4 rounded-xl text-white font-bold">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Ville étape</label>
                        <div class="flex flex-wrap gap-2" id="cityChipsContainer">
                            <button type="button" class="city-chip px-4 py-2 rounded-lg text-[10px] font-bold uppercase" data-city="Sotouboua">Sotouboua</button>
                            <button type="button" class="city-chip px-4 py-2 rounded-lg text-[10px] font-bold uppercase" data-city="Sokodé">Sokodé</button>
                            <button type="button" class="city-chip px-4 py-2 rounded-lg text-[10px] font-bold uppercase" data-city="Kara">Kara</button>
                            <button type="button" class="city-chip px-4 py-2 rounded-lg text-[10px] font-bold uppercase" data-city="Mango">Mango</button>
                            <button type="button" class="city-chip px-4 py-2 rounded-lg text-[10px] font-bold uppercase" data-city="Dapaong">Dapaong</button>
                        </div>
                        <input type="hidden" id="selectedCityInput" required>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-white/40 ml-1">Numéro WhatsApp</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 font-bold">+228</span>
                            <input type="tel" id="artistPhone" required maxlength="8" placeholder="00000000" 
                                class="input-premium w-full p-4 pl-16 rounded-xl text-white font-bold tracking-widest">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-main w-full py-4 rounded-xl text-sm shadow-lg">
                        S'inscrire à la tournée
                    </button>
                </form>
            </div>
        </section>

        <!-- Vue Admin (Candidatures) -->
        <section id="view-admin" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold uppercase italic">Candidats</h2>
                    <p id="statsLabel" class="text-[#D4AF37] text-[10px] uppercase font-black">Chargement...</p>
                </div>
                <div class="flex gap-2">
                    <button id="downloadPdfBtn" class="w-10 h-10 glass-card rounded-lg flex items-center justify-center text-[#D4AF37]">
                        <i class="fas fa-file-pdf"></i>
                    </button>
                    <button id="exitAdminBtn" class="w-10 h-10 glass-card rounded-lg flex items-center justify-center text-red-500">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div id="candidatesList" class="space-y-3">
                <!-- Rempli par JS -->
            </div>
        </section>
    </main>

    <!-- Modal Login -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="glass-card p-8 rounded-[2rem] w-full max-w-xs text-center">
            <h4 class="text-[10px] font-black uppercase text-white/40 mb-6 tracking-widest">Accès Sécurisé</h4>
            <input type="password" id="adminPass" maxlength="4" placeholder="••••" 
                class="w-full bg-transparent border-b-2 border-[#D4AF37] text-4xl text-center font-black focus:outline-none mb-6 text-[#D4AF37]">
            <div class="grid grid-cols-2 gap-3">
                <button id="cancelLoginBtn" class="text-white/20 text-[10px] font-bold uppercase">Annuler</button>
                <button id="confirmLoginBtn" class="btn-main py-3 rounded-lg text-xs">Entrer</button>
            </div>
        </div>
    </div>

    <!-- Modal Succès -->
    <div id="successModal" class="hidden fixed inset-0 bg-black/98 flex items-center justify-center z-50 p-6">
        <div class="text-center space-y-6">
            <div class="w-20 h-20 bg-[#D4AF37] rounded-full mx-auto flex items-center justify-center">
                <i class="fas fa-check text-3xl text-black"></i>
            </div>
            <h3 class="text-3xl font-black uppercase italic">Inscription Réussie</h3>
            <p class="text-white/40 text-sm">Tu fais désormais partie de l'aventure Vibz Lab.</p>
            <button onclick="window.location.reload()" class="btn-main px-10 py-3 rounded-full text-xs">Terminer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Initialisation
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vibz-tour-v2';

        let allCandidates = [];
        let user = null;

        // AUTHENTICATION
        const handleAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
        });

        handleAuth();

        // UI : Sélecteur de ville
        const chips = document.querySelectorAll('.city-chip');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                document.getElementById('selectedCityInput').value = chip.dataset.city;
            });
        });

        // FORMULAIRE : Soumission
        document.getElementById('registrationForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!user) return;

            const city = document.getElementById('selectedCityInput').value;
            if (!city) {
                alert("Veuillez sélectionner une ville étape !");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "PATIENTEZ...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                    name: document.getElementById('artistName').value,
                    city: city,
                    phone: document.getElementById('artistPhone').value,
                    createdAt: serverTimestamp()
                });
                document.getElementById('successModal').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "ERREUR - RÉESSAYER";
            }
        };

        // ADMIN : Gestion de l'accès
        document.getElementById('admin-trigger').onclick = () => {
            document.getElementById('loginModal').classList.remove('hidden');
        };

        document.getElementById('cancelLoginBtn').onclick = () => {
            document.getElementById('loginModal').classList.add('hidden');
        };

        document.getElementById('confirmLoginBtn').onclick = () => {
            const pass = document.getElementById('adminPass').value;
            if (pass === "2024" || pass === "228") {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('view-artist').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
                startDataListener();
            } else {
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').placeholder = "FAUX";
            }
        };

        document.getElementById('exitAdminBtn').onclick = () => {
            location.reload();
        };

        // ADMIN : Listener de données
        function startDataListener() {
            if (!user) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), orderBy('createdAt', 'desc'));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('candidatesList');
                list.innerHTML = '';
                allCandidates = [];

                document.getElementById('statsLabel').innerText = `${snapshot.size} Artistes inscrits`;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allCandidates.push(data);
                    
                    const item = document.createElement('div');
                    item.className = "glass-card p-4 rounded-2xl flex items-center justify-between animate-fade-in";
                    item.innerHTML = `
                        <div class="overflow-hidden">
                            <p class="text-[9px] font-black text-[#D4AF37] uppercase">${data.city || 'Ville'}</p>
                            <h4 class="font-bold truncate">${data.name}</h4>
                        </div>
                        <div class="flex gap-2">
                            <a href="tel:+228${data.phone}" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-white/40">
                                <i class="fas fa-phone-alt"></i>
                            </a>
                            <a href="https://wa.me/228${data.phone}" target="_blank" class="w-10 h-10 bg-green-500/20 text-green-500 rounded-xl flex items-center justify-center">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        // PDF GENERATION
        document.getElementById('downloadPdfBtn').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(20);
            doc.setTextColor(212, 175, 55);
            doc.text("LISTE DES CANDIDATS - VIBZ LAB", 14, 20);
            
            const rows = allCandidates.map(c => [c.name, c.city, c.phone]);
            
            doc.autoTable({
                head: [['Artiste', 'Ville', 'Contact']],
                body: rows,
                startY: 30,
                headStyles: { fillColor: [212, 175, 55], textColor: [0, 0, 0] },
                styles: { fontSize: 10 }
            });
            
            doc.save(`VibzLab_Tour_Candidats.pdf`);
        };
    </script>
</body>
</html>
